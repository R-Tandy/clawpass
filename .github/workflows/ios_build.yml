name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Build Binary via Swift Package
      run: |
        cd ios
        swift build -c release \
          --triple arm64-apple-ios16.0 \
          --sdk $(xcrun --show-sdk-path --sdk iphoneos)
    
    - name: Assemble IPA Payload
      run: |
        mkdir -p ios/Payload/ClawPass.app
        # Search the entire .build directory for the binary named 'ClawPass'
        BINARY_PATH=$(find ios/.build -name "ClawPass" -type f | head -n 1)
        if [ -z "$BINARY_PATH" ]; then
          echo "Error: Binary not found in .build directory. Listing directory contents for debug:"
          ls -R ios/.build
          exit 1
        fi
        cp "$BINARY_PATH" ios/Payload/ClawPass.app/ClawPass
        
        # Use lipo to "flatten" the binary. This forces the Mach-O segments (including __LINKEDIT) 
        # to be finalized, resolving the "string table not at the end of the file" 
        # and "__LINKEDIT isn't final" errors encountered during signing.
        lipo -create ios/Payload/ClawPass.app/ClawPass -output ios/Payload/ClawPass.app/ClawPass
        
        cat <<EOF > ios/Payload/ClawPass.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>ClawPass</string>
            <key>CFBundleIdentifier</key>
            <string>com.reno.clawpass.v3</string>
            <key>CFBundleName</key>
            <string>ClawPass</string>
            <key>CFBundlePackageType</key>
            <string>BNDL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
        </dict>
        </plist>
        EOF
        if [ -d "ios/Assets.xcassets" ]; then
          cp -R ios/Assets.xcassets ios/Payload/ClawPass.app/
        fi
    
    - name: Package as IPA
      run: |
        cd ios
        zip -r ../ClawPass-iOS.ipa Payload/
        mv ../ClawPass-iOS.ipa ../ClawPass.ipa
    
    - name: Upload Artifact
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-IPA
        path: ClawPass.ipa
