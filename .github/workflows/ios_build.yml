name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer
    
    - name: Build Swift Package for iOS
      run: |
        cd ios
        # Build the package for the arm64 simulator as a smoke test
        swift build -c debug --triple arm64-apple-ios-simulator
    
    - name: Build .app Bundle via xcodebuild (Package Mode)
      run: |
        cd ios
        xcodebuild build \
          -scheme ClawPass \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
          -derivedDataPath DerivedData \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Upload Artifact
      if: github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-Simulator
        path: ClawPass/ios/DerivedData/Build/Products/Debug-iphonesimulator/ClawPass.app
