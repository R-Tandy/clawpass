name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Build with -target + derivedDataPath (forcing it)
      run: |
        cd ios
        set +e
        xcodebuild \
          -project ClawPass.xcodeproj \
          -target ClawPass \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -derivedDataPath "$HOME/Library/Developer/Xcode/DerivedData/ClawPass" \
          -clonedSourcePackagesDirPath "$HOME/Library/Developer/Xcode/DerivedData/ClawPass/SourcePackages" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          ONLY_ACTIVE_ARCH=NO \
          ARCHS=arm64 \
          build > /tmp/xcodebuild.log 2>&1
        XCB_EXIT=$?
        set -e

        echo "=== xcodebuild exit: $XCB_EXIT ==="
        if [ "$XCB_EXIT" -ne 0 ]; then
          echo "::error::xcodebuild failed (exit $XCB_EXIT)"
          grep -E 'error:|warning:|fatal error:' /tmp/xcodebuild.log | head -80 || true
          tail -150 /tmp/xcodebuild.log || true
          exit "$XCB_EXIT"
        fi

    - name: Locate built .app
      id: locate
      run: |
        DD="$HOME/Library/Developer/Xcode/DerivedData/ClawPass"
        APP_PATH="$DD/Build/Products/Release-iphoneos/ClawPass.app"

        if [ ! -d "$APP_PATH" ]; then
          APP_PATH=$(find "$DD" -name "ClawPass.app" -type d 2>/dev/null | head -n 1)
        fi

        if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
          echo "::error::ClawPass.app not found"
          find "$DD" -maxdepth 8 -name "*.app" -type d 2>/dev/null || true
          exit 1
        fi

        echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
        echo "Located .app at: $APP_PATH"
        ls -la "$APP_PATH"

    - name: Verify bundle & create IPA
      run: |
        APP_PATH="${{ steps.locate.outputs.app_path }}"
        rm -rf ios/Payload
        mkdir -p ios/Payload
        cp -R "$APP_PATH" ios/Payload/ClawPass.app

        if [ ! -f "ios/Payload/ClawPass.app/ClawPass" ]; then
          echo "::error::Executable missing"
          ls -la ios/Payload/ClawPass.app
          exit 1
        fi

        CFB_EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" ios/Payload/ClawPass.app/Info.plist)
        if echo "$CFB_EXEC" | grep -q '\('; then
          echo "::error::Unexpanded variable in CFBundleExecutable: $CFB_EXEC"
          exit 1
        fi

        cd ios
        zip -r ../ClawPass-iOS.ipa Payload/
        mv ../ClawPass-iOS.ipa ../ClawPass.ipa
        ls -la ../ClawPass.ipa

    - name: Upload Artifact
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-IPA
        path: ClawPass.ipa
