name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Build .app Bundle via xcodebuild
      run: |
        cd ios
        xcodebuild build \
          -scheme ClawPass \
          -destination 'generic/iphoneos' \
          -derivedDataPath DerivedData \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -quiet
    
    - name: Package as .app Bundle
      run: |
        mkdir -p ios/Build/ClawPass.app
        
        BINARY_PATH=$(find ios/DerivedData -name "ClawPass" -type f | head -n 1)
        
        if [ -n "$BINARY_PATH" ]; then
          echo "Found binary at $BINARY_PATH, copying to bundle root..."
          cp "$BINARY_PATH" ios/Build/ClawPass.app/ClawPass
          chmod +x ios/Build/ClawPass.app/ClawPass
        else
          echo "Binary not found in DerivedData!"
          exit 1
        fi
        
        cat <<EOF > ios/Build/ClawPass.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>ClawPass</string>
            <key>CFBundleIdentifier</key>
            <string>com.reno.clawpass.v3</string>
            <key>CFBundleName</key>
            <string>ClawPass</string>
            <key>CFBundlePackageType</key>
            <string>BNDL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
        </dict>
        </plist>
        EOF
    
    - name: Create IPA
      run: |
        mkdir -p ios/Build/Payload
        cp -R ios/Build/ClawPass.app ios/Build/Payload/
        cd ios/Build
        zip -r ClawPass.ipa Payload
    
    - name: Upload Artifact
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-IPA
        path: ios/Build/ClawPass.ipa