name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Show available SDKs
      run: xcodebuild -showsdks | grep -i ios || true

    - name: List project targets/schemes
      run: |
        cd ios
        xcodebuild -list -project ClawPass.xcodeproj || true

    - name: Build with xcodebuild (Release, unsigned, iOS device)
      run: |
        cd ios
        # Build the app for an iOS device target, Release config, with code
        # signing DISABLED. SideStore's iLoader accepts a fully unsigned .app
        # inside the IPA and signs it with the developer's free provisioning
        # profile at install time, so we don't need a real cert on the runner.
        #
        # We pass -derivedDataPath to put the build output in a known location
        # (the runner's user dir, NOT the project tree). Without this, some
        # Xcode versions default to ./build relative to the project, which
        # causes 'lstat(...SQLite.swift_SQLite.bundle): No such file or
        # directory' errors when the SwiftPM package resource bundle can't
        # be located.
        set +e
        xcodebuild \
          -project ClawPass.xcodeproj \
          -scheme ClawPass \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -derivedDataPath "$HOME/Library/Developer/Xcode/DerivedData/ClawPass" \
          -clonedSourcePackagesDirPath "$HOME/Library/Developer/Xcode/DerivedData/ClawPass/SourcePackages" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          ONLY_ACTIVE_ARCH=NO \
          ARCHS=arm64 \
          build > /tmp/xcodebuild.log 2>&1
        XCB_EXIT=$?
        set -e
        echo "=== xcodebuild tail (last 80 lines) ==="
        tail -80 /tmp/xcodebuild.log || true
        echo "=== xcodebuild exit: $XCB_EXIT ==="
        if [ "$XCB_EXIT" -ne 0 ]; then
          echo "::error::xcodebuild failed (exit $XCB_EXIT). Extracting error lines:"
          grep -E 'error:|warning:|fatal error:|note:' /tmp/xcodebuild.log | head -100 || true
          echo "---"
          echo "Last 120 lines of full log:"
          tail -120 /tmp/xcodebuild.log || true
          exit "$XCB_EXIT"
        fi

    - name: Locate built .app
      id: locate
      run: |
        # We pass -derivedDataPath explicitly to xcodebuild, so the output
        # is at $DD/Build/Products/Release-iphoneos/ClawPass.app
        DD="$HOME/Library/Developer/Xcode/DerivedData/ClawPass"
        APP_PATH="$DD/Build/Products/Release-iphoneos/ClawPass.app"
        if [ ! -d "$APP_PATH" ]; then
          # Fallback: search the DerivedData tree.
          APP_PATH=$(find "$DD" -name "ClawPass.app" -type d 2>/dev/null | head -n 1)
        fi
        if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
          echo "::error::ClawPass.app not found. Dumping DerivedData:"
          find "$DD" -maxdepth 6 -type d 2>/dev/null || true
          exit 1
        fi
        echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
        echo "Located .app at: $APP_PATH"
        ls -la "$APP_PATH"
        /usr/libexec/PlistBuddy -c "Print" "$APP_PATH/Info.plist" 2>/dev/null | head -60

    - name: Package as IPA
      run: |
        APP_PATH="${{ steps.locate.outputs.app_path }}"
        rm -rf ios/Payload
        mkdir -p ios/Payload
        cp -R "$APP_PATH" ios/Payload/ClawPass.app

        # Verify the executable exists in the bundle.
        if [ ! -f "ios/Payload/ClawPass.app/ClawPass" ]; then
          echo "::error::ClawPass executable missing inside ClawPass.app"
          ls -la ios/Payload/ClawPass.app
          exit 1
        fi

        # Confirm CFBundleExecutable is a real string, not an unexpanded placeholder.
        CFB_EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" ios/Payload/ClawPass.app/Info.plist)
        echo "CFBundleExecutable in built bundle: $CFB_EXEC"
        if echo "$CFB_EXEC" | grep -q '\$('; then
          echo "::error::CFBundleExecutable still contains an unresolved Xcode variable: $CFB_EXEC"
          exit 1
        fi

        cd ios
        zip -r ../ClawPass-iOS.ipa Payload/
        mv ../ClawPass-iOS.ipa ../ClawPass.ipa
        echo "IPA size:"
        ls -la ../ClawPass.ipa

    - name: Upload Artifact
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-IPA
        path: ClawPass.ipa
