name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # Removed the hardcoded /Applications/Xcode_15.0.app path which is causing the error.
    # macos-latest already has a default Xcode version selected.
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Build Swift Package for iOS
      run: |
        cd ios
        swift build -c release --triple arm64-apple-ios15.0-macosx
    
    - name: Build .app Bundle via xcodebuild (Package Mode)
      run: |
        cd ios
        xcodebuild build \
          -scheme ClawPass \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
          -derivedDataPath DerivedData \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Strip Binary (Prevent Developer 35/64 errors)
      run: |
        # Find the binary in DerivedData and strip debug symbols
        BINARY_PATH=$(find ios/DerivedData -name "ClawPass" -type f | head -n 1)
        if [ -n "$BINARY_PATH" ]; then
          echo "Stripping binary at $BINARY_PATH"
          strip -x "$BINARY_PATH"
        else
          echo "Binary not found, skipping strip."
        fi
    
    - name: Upload Artifact
      if: github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-Simulator
        path: ClawPass/ios/DerivedData/Build/Products/Debug-iphonesimulator/ClawPass.app
