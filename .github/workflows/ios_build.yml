name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Build Binary via Swift Package
      run: |
        cd ios
        # Build a release binary for arm64 iOS. SwiftPM places the executable
        # at ios/.build/<triple>/release/ClawPass.
        swift build -c release \
          --triple arm64-apple-ios16.0 \
          --sdk $(xcrun --show-sdk-path --sdk iphoneos) \
          -Xswiftc -O
    
    - name: Locate built binary
      id: locate
      run: |
        cd ios
        # Preferred path: SwiftPM places the product under .build/<triple>/release/
        BINARY_PATH=$(find .build -name "ClawPass" -type f -perm +111 2>/dev/null | head -n 1)
        if [ -z "$BINARY_PATH" ]; then
          # Fallback: any executable named ClawPass anywhere under ios/
          BINARY_PATH=$(find . -name "ClawPass" -type f -perm +111 2>/dev/null | head -n 1)
        fi
        if [ -z "$BINARY_PATH" ]; then
          echo "::error::ClawPass binary not found after build. Dumping ios/.build contents:"
          find .build -maxdepth 6 -type f 2>/dev/null || true
          exit 1
        fi
        echo "binary_path=$BINARY_PATH" >> $GITHUB_OUTPUT
        echo "Located binary at: $BINARY_PATH"
    
    - name: Assemble .app bundle
      run: |
        cd ios
        APP_DIR="Payload/ClawPass.app"
        rm -rf "$APP_DIR"
        mkdir -p "$APP_DIR"
        
        # Copy the executable (do not run lipo on a single-arch binary).
        BINARY_PATH="${{ steps.locate.outputs.binary_path }}"
        cp "$BINARY_PATH" "$APP_DIR/ClawPass"
        chmod +x "$APP_DIR/ClawPass"
        
        # Verify the binary is a valid arm64 Mach-O.
        file "$APP_DIR/ClawPass"
        
        # Copy the real Info.plist from source. This preserves all usage
        # description strings (NSLocalNetworkUsageDescription, NSFaceIDUsageDescription,
        # NSBonjourServices) which are required for sync and biometrics to work.
        cp Info.plist "$APP_DIR/Info.plist"
        
        # Copy the SwiftPM resource bundle (contains compiled Assets.car) next to the binary.
        # iOS will not pick this up as the app's main icon, but it keeps resources available.
        if [ -d ".build/arm64-apple-ios16.0/release/ClawPass_ClawPass.bundle" ]; then
          cp -R ".build/arm64-apple-ios16.0/release/ClawPass_ClawPass.bundle" "$APP_DIR/"
        fi
        
        echo "App bundle contents:"
        ls -la "$APP_DIR"
    
    - name: Package as IPA
      run: |
        cd ios
        zip -r ../ClawPass-iOS.ipa Payload/
        mv ../ClawPass-iOS.ipa ../ClawPass.ipa
        echo "IPA size:"
        ls -la ../ClawPass.ipa
    
    - name: Upload Artifact
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-IPA
        path: ClawPass.ipa
