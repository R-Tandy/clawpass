name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Create XCWorkspace for SPM Support
      run: |
        # Create workspace to enable SPM
        mkdir -p ClawPass.xcworkspace/xcshareddata/swiftpm
        
        cat > ClawPass.xcworkspace/contents.xcworkspacedata << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<Workspace version="1.0">
  <FileRef location="group:ClawPass.xcodeproj"></FileRef>
</Workspace>
EOF
        
        # Copy Package.resolved for SPM
        if [ -f Package.resolved ]; then
          mkdir -p ClawPass.xcworkspace/xcshareddata/swiftpm
          cp Package.resolved ClawPass.xcworkspace/xcshareddata/swiftpm/
        fi
    
    - name: Resolve Packages
      run: |
        xcodebuild -resolvePackageDependencies \
          -workspace ClawPass.xcworkspace \
          -scheme ClawPass \
          -derivedDataPath .build/DerivedData 2>&1 || true
    
    - name: Build for iOS Device (Unsigned)
      run: |
        xcodebuild archive \
          -workspace ClawPass.xcworkspace \
          -scheme ClawPass \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/ClawPass.xcarchive \
          -derivedDataPath .build/DerivedData \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_SPECIFIER=""
    
    - name: Create IPA Structure
      run: |
        # Find the built app
        APP_PATH=$(find build/ClawPass.xcarchive -name "*.app" -type d | head -1)
        echo "Found app at: $APP_PATH"
        
        # Create Payload directory for IPA
        mkdir -p build/Payload
        
        # Copy the app bundle
        cp -r "$APP_PATH" build/Payload/
        
        # Create IPA (unsigned, AltStore will sign it)
        cd build
        zip -r ClawPass.ipa Payload
        echo "Created ClawPass.ipa"
        ls -lh ClawPass.ipa
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-IPA
        path: build/ClawPass.ipa
        retention-days: 30
