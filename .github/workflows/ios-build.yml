name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Show Swift version
      run: swift --version
    
    - name: Build using Swift Package Manager
      run: |
        # Build for iOS using SwiftPM and xcbuild
        swift build -Xswiftc -sdk -Xswiftc $(xcrun --sdk iphoneos --show-sdk-path) \
          -Xswiftc -target -Xswiftc arm64-apple-ios16.0 \
          -Xcc -arch -Xcc arm64 \
          -c release
    
    - name: Create App Bundle from Build
      run: |
        # Find the built product
        BUILD_PATH=$(find .build -name "*.app" -type d 2>/dev/null | head -1)
        
        if [ -z "$BUILD_PATH" ]; then
          echo "No .app found, trying executable..."
          BUILD_PATH=$(find .build -type f -perm +111 2>/dev/null | head -1)
          echo "Found: $BUILD_PATH"
        fi
        
        # Create Payload directory
        mkdir -p build/Payload
        
        if [ -d "$BUILD_PATH" ]; then
          cp -r "$BUILD_PATH" build/Payload/
        fi
        
        # Create IPA
        cd build
        zip -r ClawPass.ipa Payload
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-IPA
        path: build/ClawPass.ipa
        retention-days: 30
      if: always()
