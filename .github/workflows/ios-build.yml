name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup CocoaPods
      run: |
        sudo gem install cocoapods
    
    - name: Install Dependencies
      run: |
        pod install
    
    - name: Generate App Icons
      run: |
        # Install ImageMagick for icon conversion
        brew install imagemagick || true
        
        # Check for source icon
        if [ -f "icon.png" ]; then
          SOURCE="icon.png"
        elif [ -f "icon.ico" ]; then
          SOURCE="icon.ico"
        else
          echo "No icon source found, using placeholder"
          SOURCE=""
        fi
        
        # Generate icons if source exists
        if [ -n "$SOURCE" ]; then
          cd ClawPass/Assets.xcassets/AppIcon.appiconset
          
          # Generate various sizes
          convert "$SOURCE" -resize 40x40 Icon-20@2x.png 2>/dev/null || true
          convert "$SOURCE" -resize 60x60 Icon-20@3x.png 2>/dev/null || true
          convert "$SOURCE" -resize 58x58 Icon-29@2x.png 2>/dev/null || true
          convert "$SOURCE" -resize 87x87 Icon-29@3x.png 2>/dev/null || true
          convert "$SOURCE" -resize 80x80 Icon-40@2x.png 2>/dev/null || true
          convert "$SOURCE" -resize 120x120 Icon-40@3x.png 2>/dev/null || true
          convert "$SOURCE" -resize 120x120 Icon-60@2x.png 2>/dev/null || true
          convert "$SOURCE" -resize 180x180 Icon-60@3x.png 2>/dev/null || true
          convert "$SOURCE" -resize 1024x1024 Icon-1024@1x.png 2>/dev/null || true
          
          ls -la *.png 2>/dev/null || echo "Icon generation may have failed"
        fi
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Build for iOS Device (Unsigned)
      run: |
        xcodebuild archive \
          -workspace ClawPass.xcworkspace \
          -scheme ClawPass \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/ClawPass.xcarchive \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_SPECIFIER=""
    
    - name: Create IPA Structure
      run: |
        APP_PATH=$(find build/ClawPass.xcarchive -name "*.app" -type d | head -1)
        echo "Found app at: $APP_PATH"
        mkdir -p build/Payload
        cp -r "$APP_PATH" build/Payload/
        cd build
        zip -r ClawPass.ipa Payload
        ls -lh ClawPass.ipa
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-IPA
        path: build/ClawPass.ipa
        retention-days: 30
