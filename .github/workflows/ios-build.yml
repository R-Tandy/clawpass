name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Resolve Packages
      run: swift package resolve
    
    - name: Build for iOS Device (Unsigned)
      run: |
        # Build the package for iOS
        xcodebuild archive \
          -scheme ClawPass \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/ClawPass.xcarchive \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_SPECIFIER=""
    
    - name: Create IPA Structure
      run: |
        # Find the built app
        APP_PATH=$(find build/ClawPass.xcarchive -name "*.app" -type d | head -1)
        echo "Found app at: $APP_PATH"
        
        # Create Payload directory for IPA
        mkdir -p build/Payload
        
        # Copy the app bundle
        cp -r "$APP_PATH" build/Payload/
        
        # Create IPA (unsigned, AltStore will sign it)
        cd build
        zip -r ClawPass.ipa Payload
        echo "Created ClawPass.ipa"
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-IPA
        path: build/ClawPass.ipa
        retention-days: 30
