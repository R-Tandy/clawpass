name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Resolve Packages
      run: swift package resolve
    
    - name: Generate Xcode Project from Package
      run: |
        # Generate Xcode project from Package.swift for iOS
        swift package generate-xcodeproj 2>&1 || true
        
        # If that fails, use xcodebuild on the package directly
        # xcodebuild can build Swift packages directly
        xcodebuild -resolvePackageDependencies -scheme ClawPass 2>&1 || true
    
    - name: Build for iOS Device (Unsigned)
      run: |
        # Try building the package for iOS
        xcodebuild archive \
          -scheme ClawPass \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/ClawPass.xcarchive \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_SPECIFIER="" \
          2>&1 | tee build.log || true
        
        # Check what we got
        find build -name "*.app" -o -name "ClawPass" 2>/dev/null || true
    
    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 1
