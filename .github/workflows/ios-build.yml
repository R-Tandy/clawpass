name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Resolve SPM dependencies
      run: xcodebuild -project ClawPass.xcodeproj -scheme ClawPass -configuration Release -resolvePackageDependencies 2>&1 | tail -20
    
    - name: Build for iOS Device (Unsigned)
      run: |
        xcodebuild build \
          -project ClawPass.xcodeproj \
          -scheme ClawPass \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_SPECIFIER="" \
          2>&1 | tail -30
    
    - name: Build for iOS Simulator
      run: |
        xcodebuild build \
          -project ClawPass.xcodeproj \
          -scheme ClawPass \
          -sdk iphonesimulator \
          -configuration Release \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_SPECIFIER="" \
          2>&1 | tail -20
