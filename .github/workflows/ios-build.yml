name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Create XCWorkspace for SPM Support
      run: |
        mkdir -p ClawPass.xcworkspace/xcshareddata/swiftpm
        echo '<?xml version="1.0" encoding="UTF-8"?>' > ClawPass.xcworkspace/contents.xcworkspacedata
        echo '<Workspace version="1.0">' >> ClawPass.xcworkspace/contents.xcworkspacedata
        echo '  <FileRef location="group:ClawPass.xcodeproj"></FileRef>' >> ClawPass.xcworkspace/contents.xcworkspacedata
        echo '</Workspace>' >> ClawPass.xcworkspace/contents.xcworkspacedata
        if [ -f Package.resolved ]; then
          cp Package.resolved ClawPass.xcworkspace/xcshareddata/swiftpm/ 2>/dev/null || true
        fi
    
    - name: Resolve Packages
      run: |
        xcodebuild -resolvePackageDependencies \
          -workspace ClawPass.xcworkspace \
          -scheme ClawPass \
          -derivedDataPath .build/DerivedData 2>&1 || true
    
    - name: Build for iOS Device (Unsigned)
      run: |
        xcodebuild archive \
          -workspace ClawPass.xcworkspace \
          -scheme ClawPass \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/ClawPass.xcarchive \
          -derivedDataPath .build/DerivedData \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_SPECIFIER=""
    
    - name: Create IPA Structure
      run: |
        APP_PATH=$(find build/ClawPass.xcarchive -name "*.app" -type d | head -1)
        echo "Found app at: $APP_PATH"
        mkdir -p build/Payload
        cp -r "$APP_PATH" build/Payload/
        cd build
        zip -r ClawPass.ipa Payload
        ls -lh ClawPass.ipa
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-IPA
        path: build/ClawPass.ipa
        retention-days: 30
