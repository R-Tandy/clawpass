name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Fetch and embed SQLite.swift
      run: |
        # Clone SQLite.swift
        git clone --depth 1 --branch 0.16.0 https://github.com/stephencelis/SQLite.swift.git .sqlite-temp
        
        # Copy SQLite sources directly into ClawPass
        mkdir -p ClawPass/SQLite
        cp -r .sqlite-temp/Sources/SQLite/* ClawPass/SQLite/ 2>/dev/null || true
        
        # Show what we got
        ls -la ClawPass/SQLite/
        
        # Clean up
        rm -rf .sqlite-temp
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Build for iOS Device (Unsigned)
      run: |
        xcodebuild archive \
          -project ClawPass.xcodeproj \
          -scheme ClawPass \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/ClawPass.xcarchive \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_SPECIFIER=""
    
    - name: Create IPA Structure
      run: |
        APP_PATH=$(find build/ClawPass.xcarchive -name "*.app" -type d | head -1)
        echo "Found app at: $APP_PATH"
        mkdir -p build/Payload
        cp -r "$APP_PATH" build/Payload/
        cd build
        zip -r ClawPass.ipa Payload
        ls -lh ClawPass.ipa
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-IPA
        path: build/ClawPass.ipa
        retention-days: 30
