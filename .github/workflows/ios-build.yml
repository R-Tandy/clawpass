name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Build for iOS Device (Unsigned)
      run: |
        xcodebuild archive \
          -project ClawPass.xcodeproj \
          -scheme ClawPass \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -archivePath build/ClawPass.xcarchive \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_SPECIFIER=""
    
    - name: Create IPA Structure
      run: |
        # Create Payload directory for IPA
        mkdir -p build/Payload
        
        # Copy the app bundle from the archive
        cp -r build/ClawPass.xcarchive/Products/Applications/ClawPass.app build/Payload/
        
        # Create IPA (unsigned, AltStore will sign it)
        cd build
        zip -r ClawPass.ipa Payload
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-IPA
        path: build/ClawPass.ipa
        retention-days: 30
