name: CI Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ClawPass/ios
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '14.3'
      - name: Build iOS app
        run: |
          swift build
          xcodebuild -scheme ClawPass -sdk iphoneos -configuration Release clean build
