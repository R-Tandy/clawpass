name: CI Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ClawPass/ios
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod install
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build iOS app
        run: |
          swift build
          xcodebuild -scheme ClawPass -sdk iphoneos -configuration Release clean build
      - name: Create IPA structure
        run: |
          mkdir -p ipa
          cp -R .build/Release-iphoneos/*.app ipa/ || true
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: ipa
