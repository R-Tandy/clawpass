name: iOS Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ClawPass/ios  # Key fix: run from ios subdirectory
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer
    
    - name: Show Xcode version
      run: xcodebuild -version
    
    # Build for iOS Simulator (no code signing needed)
    - name: Build for Simulator
      run: |
        xcodebuild build \
          -project ClawPass.xcodeproj \
          -scheme ClawPass \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
          -derivedDataPath DerivedData \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    # Optional: Create app bundle for distribution
    - name: Create App Bundle
      if: github.ref == 'refs/heads/master'
      run: |
        mkdir -p build/Products
        cp -r DerivedData/Build/Products/Debug-iphonesimulator/ClawPass.app build/Products/
    
    - name: Upload Artifact
      if: github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: ClawPass-iOS-Simulator
        path: ClawPass/ios/build/Products/
